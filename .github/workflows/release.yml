name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ai
            asset_name: ai
          - os: windows-latest
            artifact_name: ai.exe
            asset_name: ai.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries for release
        run: |
          cp artifacts/ai/ai         ai
          cp artifacts/ai.exe/ai.exe ai.exe

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Downloads

            | Platform | File to download |
            |----------|-----------------|
            | Linux (x86_64) | `ai` |
            | Windows (x86_64) | `ai.exe` |

            ### Setup
            - **Linux:** download `ai`, run `chmod +x ai`, then `./ai` — or move it to somewhere in your `PATH` (e.g. `/usr/local/bin/ai`).
            - **Windows:** download `ai.exe` and run it directly, or add its folder to your `PATH`.
          files: |
            ai
            ai.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
