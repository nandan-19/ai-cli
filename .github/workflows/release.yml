name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ai
            asset_name: ai-linux-x86_64
          - os: windows-latest
            artifact_name: ai.exe
            asset_name: ai-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries for release
        run: |
          cp artifacts/ai-linux-x86_64/ai        ai-linux-x86_64
          cp artifacts/ai-windows-x86_64.exe/ai.exe ai-windows-x86_64.exe

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Downloads

            | Platform | Binary |
            |----------|--------|
            | Linux (x86_64) | `ai-linux-x86_64` |
            | Windows (x86_64) | `ai-windows-x86_64.exe` |

            ### Usage
            Download the binary for your platform.
            - **Linux:** `chmod +x ai-linux-x86_64`, then run `./ai-linux-x86_64` or rename it to `ai` and add it to your `PATH`.
            - **Windows:** run `ai-windows-x86_64.exe` directly, or rename it to `ai.exe` and add it to your `PATH`.
          files: |
            ai-linux-x86_64
            ai-windows-x86_64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
